name: Build and deploy docs

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: |
          # Install Sphinx + docs extras first, then the lightweight runtime
          # deps autodoc needs at import time. Heavy deps (torch, kokoro, cv2)
          # are imported lazily inside functions so autodoc never triggers them.
          pip install sphinx furo "myst-nb>=4" sphinx-autodoc-typehints
          pip install numpy rapidfuzz pysbd pymupdf pytesseract pillow soundfile
          pip install -e . --no-deps

      - name: Build Sphinx docs
        run: |
          sphinx-build -W --keep-going sphinx sphinx/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sphinx/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
