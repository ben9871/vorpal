name: Build and deploy docs

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: |
          # Sphinx + theme + notebook renderer
          pip install sphinx furo "myst-nb>=1.0" sphinx-autodoc-typehints
          # Lightweight runtime deps autodoc needs at import time.
          # Heavy deps (torch, kokoro, cv2) are imported lazily inside functions.
          pip install numpy rapidfuzz pysbd PyMuPDF pytesseract pillow soundfile
          # Install vorpal itself (editable, skip heavy transitive deps)
          pip install -e . --no-deps

      - name: Build Sphinx docs
        run: |
          sphinx-build --keep-going sphinx sphinx/_build/html
          touch sphinx/_build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sphinx/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
