name: Build and deploy docs

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: |
          # Install only the lightweight subset needed for Sphinx:
          # core package (editable, no heavy TTS deps) + docs extras.
          # Heavy imports (torch, kokoro, cv2, pytesseract) are all inside
          # functions so autodoc never triggers them.
          pip install numpy rapidfuzz pysbd
          pip install -e ".[docs]" --no-deps
          pip install pymupdf pytesseract pillow soundfile

      - name: Build Sphinx docs
        run: |
          python -m sphinx sphinx sphinx/_build/html -W --keep-going

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sphinx/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
